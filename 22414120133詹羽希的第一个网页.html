<!DOCTYPE html>

<head>

<title>沾沾的百宝箱</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #513796, #d7d3e4, #d9a4ca);
    color: white;
    overflow-x: hidden;
  }
  .navbar {
    display: flex;
    justify-content: center;
    background: rgba(0, 0, 0, 0.5);
    padding: 10px 0;
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  .navbar a {
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    margin: 0 10px;
    border-radius: 5px;
    transition: background 0.3s ease, transform 0.3s ease;
  }
  .navbar a:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: scale(1.1);
  }
  .container {
    padding: 50px 20px;
    opacity: 0;
    transform: translateY(50px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .container a {
    color: white;
  }

  .container.active {
    opacity: 1;
    transform: translateY(0);
  }
  .project {
    margin-bottom: 40px;
    padding: 20px;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.5);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .project:hover {
    transform: translateY(-10px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
  }
  .project img {
    width: 100%;
    border-radius: 10px;
    transition: transform 0.3s ease;
  }
  .project img:hover {
    transform: scale(1.05);
  }
  .footer {
    background: rgba(0, 0, 0, 0.7);
    color: white;
    text-align: center;
    padding: 20px;
    position: relative;
    margin-top: 50px;
    animation: fadeIn 1s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .footer:hover {
    background: rgba(0, 0, 0, 0.8);
  }
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }
  .modal-content {
    background: rgba(255, 255, 255, 0.1);
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    text-align: center;
  }
  .modal-content input {
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
    width: 80%;
  }
  .modal-content button {
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    background: #513796;
    color: white;
    cursor: pointer;
  }
  .modal-content button:hover {
    background: #412276;
  }
  .error-message {
    color: #ff6b6b;
    margin-top: 10px;
  }
</style>

  <p>版权所有 © 2024 UriyaNikos</p>

<div id="password-modal" class="modal-overlay" style="display: none;">
  <div class="modal-content">
    <h2>请输入密码</h2>
    <input type="password" id="password-input" placeholder="密码">
    <button id="submit-password">提交</button>
    <p id="error-message" class="error-message"></p>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const containers = document.querySelectorAll('.container');

    function activateContainer(container) {
      container.classList.add('active');
    }

    function handleScroll() {
      containers.forEach(container => {
        const rect = container.getBoundingClientRect();
        if (rect.top < window.innerHeight && rect.bottom >= 0) {
          activateContainer(container);
        }
      });
    }

    window.addEventListener('scroll', handleScroll);
    handleScroll(); // Initial check
  });

  // 密码保护逻辑
  const protectedLink = document.getElementById('protected-link');
  const passwordModal = document.getElementById('password-modal');
  const passwordInput = document.getElementById('password-input');
  const submitButton = document.getElementById('submit-password');
  const errorMessage = document.getElementById('error-message');

  // 设置正确的密码
  const correctPassword = "uriyanikos0802";

  protectedLink.addEventListener('click', function(event) {
    event.preventDefault();
    passwordModal.style.display = 'flex';
  });

  submitButton.addEventListener('click', function() {
    if (passwordInput.value === correctPassword) {
      window.location.href = "https://zhanyuxi.my.canvasite.cn/kuailemoyuzhong";
    } else {
      errorMessage.textContent = "你不是沾沾本人哟！";
    }
  });

  passwordInput.addEventListener('keypress', function(event) {
    if (event.key === 'Enter') {
      submitButton.click();
    }
  });
</script>

</body>
</html>
